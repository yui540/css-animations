<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>飛び出すCSSアニメーション</title>
    <style>
      html {
        background-color: #e0e0e0;
      }

      .container {
        position: absolute;
        top: 50%;
        left: 50%;
        max-width: 320px;
        width: 100%;
        aspect-ratio: 1;
        background-color: #fff;
        transform: translate(-50%, -50%);
        overflow: hidden;
      }

      .box {
        position: absolute;
        bottom: 35%;
        width: 100%;
        display: grid;
        row-gap: 3px;
        justify-items: center;
        align-content: end;
      }
      .box__block {
        position: relative;
        width: 120px;
        height: 40px;
        border-radius: 8px;
        transform-origin: bottom center;

        &:nth-child(1) {
          background-color: #aaa;
          animation: jump 0.7s ease-in-out 0.3s both;
        }
        &:nth-child(2) {
          background-color: #888;
          animation: push 0.5s ease-in-out 0.2s both;
        }
      }
      @keyframes jump {
        from {
          transform: translateY(0);
        }
        40% {
          transform: translateY(-40%) rotate(6deg);
        }
        60% {
          transform: translateY(0%);
        }
        80% {
          transform: translateY(-20%) rotate(-3deg);
        }
        to {
          transform: translateY(0);
        }
      }
      @keyframes push {
        from {
          height: 0;
        }
        60% {
          height: 48px;
        }
        to {
          height: 40px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="box">
        <div class="box__block"></div>
        <div class="box__block"></div>
      </div>
    </div>
  </body>
</html>
