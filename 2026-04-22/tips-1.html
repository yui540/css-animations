<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>シャッター</title>
    <style>
      html {
        background-color: #e0e0e0;
      }

      .container {
        position: absolute;
        top: 50%;
        left: 50%;
        max-width: 320px;
        width: 100%;
        aspect-ratio: 1;
        background-color: #fff;
        transform: translate(-50%, -50%);
        overflow: hidden;
      }

      .shutter {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
      }

      .shutter__block {
        position: relative;
        width: 100%;
        height: 40px;
        height: 10px;
        animation:
          block-in 0.5s ease-in-out var(--delay, 0s) both,
          block-out 0.5s ease-in-out calc(var(--delay, 0s) + 1.1s) forwards;

        &:nth-child(1) {
          --delay: 0.2s;
        }
        &:nth-child(2) {
          --delay: 0.25s;
        }
        &:nth-child(3) {
          --delay: 0.3s;
        }
        &:nth-child(4) {
          --delay: 0.35s;
        }

        &:nth-child(1),
        &:nth-child(3) {
          background-color: #bbb;
        }
        &:nth-child(2),
        &:nth-child(4) {
          background-color: #ccc;
        }
      }
      @keyframes block-in {
        from {
          height: 15px;
        }
        60% {
          height: 75px;
        }
        to {
          height: 73px;
        }
      }
      @keyframes block-out {
        from {
          height: 73px;
        }
        60% {
          height: 13px;
        }
        to {
          height: 15px;
        }
      }

      .shutter__handle {
        position: relative;
        width: 100%;
        height: 30px;
        background-color: #aaa;

        &::before {
          content: "";
          display: block;
          position: absolute;
          top: 50%;
          left: 50%;
          width: 50px;
          height: 12px;
          transform: translate(-50%, -50%);
          background-color: #f1f1f1;
          border-radius: 999px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="shutter">
        <div class="shutter__block"></div>
        <div class="shutter__block"></div>
        <div class="shutter__block"></div>
        <div class="shutter__block"></div>
        <div class="shutter__handle"></div>
      </div>
    </div>
  </body>
</html>
