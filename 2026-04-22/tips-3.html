<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>塗り</title>
    <style>
      html {
        background-color: #e0e0e0;
      }

      .container {
        position: absolute;
        top: 50%;
        left: 50%;
        max-width: 320px;
        width: 100%;
        aspect-ratio: 1;
        background-color: #fff;
        transform: translate(-50%, -50%);
        overflow: hidden;
      }

      .lines {
        position: absolute;
        top: -11%;
        left: 0;
        width: 100%;
        height: 122%;
      }

      .lines__line {
        position: absolute;
        top: 0;
        width: 26%;
        height: 100%;

        &:nth-child(2n) {
          transform: scaleY(-1);
        }

        &:nth-child(1) {
          --delay: 0.2s;
          left: 0;
        }
        &:nth-child(2) {
          --delay: 0.36s;
          left: 25%;
        }
        &:nth-child(3) {
          --delay: 0.52s;
          left: 50%;
        }
        &:nth-child(4) {
          --delay: 0.68s;
          left: 75%;
        }

        &::after {
          content: "";
          display: block;
          position: absolute;
          inset: 0;
          border-radius: 999px;
          background-color: #999;
          animation:
            slide-in 0.3s ease-in-out var(--delay, 0s) both,
            slide-out 0.26s ease-in-out calc(var(--delay, 0s) + 1s) forwards;
        }
      }
      @keyframes slide-in {
        from {
          transform: translateY(-101%);
        }
        to {
          transform: translateY(0);
        }
      }
      @keyframes slide-out {
        from {
          transform: translateY(0);
        }
        to {
          transform: translateY(101%);
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="lines">
        <div class="lines__line"></div>
        <div class="lines__line"></div>
        <div class="lines__line"></div>
        <div class="lines__line"></div>
      </div>
    </div>
  </body>
</html>
