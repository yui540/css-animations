<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ひっくり返す</title>
    <style>
      html {
        background-color: #fff;
      }

      .container {
        position: absolute;
        top: 50%;
        left: 50%;
        max-width: 320px;
        width: 100%;
        aspect-ratio: 1;
        background-color: #eee;
        transform: translate(-50%, -50%);
        overflow: hidden;
      }

      .wrapper {
        position: absolute;
        inset: 0;
        transform: scale(1.5);
      }

      .box {
        --size: 80px;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -70%);
        width: var(--size);
        height: var(--size);
      }

      .box__line {
        position: absolute;
        bottom: 0%;
        left: 50%;
        transform: translate(-50%, 100%);
        width: 3px;
        height: 45%;
        animation:
          pull 1s ease-in-out 0.2s both,
          pull 1s ease-in-out 2s forwards;
      }
      .box__line-inner {
        position: absolute;
        inset: 0;
        background-color: #ccc;
      }
      @keyframes pull {
        from,
        to {
          transform: translate(-50%, 100%);
        }
        30% {
          transform: translate(-50%, 130%);
        }
        60% {
          transform: translate(-50%, 92%);
        }
      }

      .box__line-inner {
        position: absolute;
        inset: 0;
        transform-origin: top center;
        animation:
          sway 1.5s ease-in-out 0.2s both,
          sway-reverse 1.5s ease-in-out 2s forwards;

        &::before {
          content: "";
          display: block;
          position: absolute;
          bottom: 0;
          left: 0;
          width: 100%;
          height: 200%;
          background-color: #ccc;
        }
        &::after {
          content: "";
          display: block;
          position: absolute;
          bottom: 0;
          left: 50%;
          width: 400%;
          aspect-ratio: 1;
          transform: translateX(-50%);
          background-color: #999;
          border-radius: 999px;
        }
      }
      @keyframes sway {
        0%,
        100% {
          transform: rotate(0deg);
        }
        30% {
          transform: rotate(-10deg);
        }
        60% {
          transform: rotate(7deg);
        }
      }
      @keyframes sway-reverse {
        0%,
        100% {
          transform: rotate(0deg);
        }
        30% {
          transform: rotate(10deg);
        }
        60% {
          transform: rotate(-7deg);
        }
      }

      .box__rect {
        position: absolute;
        inset: 0;
        background-color: #e0e0e0;
        border-radius: 25%;
        overflow: hidden;
      }

      .box__rect-inner {
        position: absolute;
        inset: 0;
        transform-origin: bottom center;
        animation:
          turn 1s ease-in-out 0.35s both,
          turn-reverse 1s ease-in-out 2.15s forwards;
      }
      @keyframes turn {
        from {
          transform: rotate(0deg);
        }
        50% {
          transform: rotate(-190deg);
        }
        75% {
          transform: rotate(-175deg);
        }
        to {
          transform: rotate(-180deg);
        }
      }
      @keyframes turn-reverse {
        from {
          transform: rotate(-180deg);
        }
        50% {
          transform: rotate(10deg);
        }
        75% {
          transform: rotate(-5deg);
        }
        to {
          transform: rotate(0deg);
        }
      }

      .box__rect-base {
        position: absolute;
        inset: 0;
        transform-origin: bottom center;

        &::before {
          content: "";
          display: block;
          position: absolute;
          bottom: 0;
          left: 50%;
          transform: translateX(-50%);
          width: 200%;
          height: 200%;
          background-color: currentColor;
        }
      }
      .box__rect-base--light {
        color: #fff;
      }
      .box__rect-base--dark {
        transform: rotate(180deg);
        color: #999;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="wrapper">
        <div class="box">
          <div class="box__line">
            <div class="box__line-inner"></div>
          </div>
          <div class="box__rect">
            <div class="box__rect-inner">
              <div class="box__rect-base box__rect-base--light"></div>
              <div class="box__rect-base box__rect-base--dark"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
