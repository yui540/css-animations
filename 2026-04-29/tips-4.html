<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ぴょんぴょん</title>
    <style>
      html {
        background-color: #e0e0e0;
      }

      .container {
        position: absolute;
        top: 50%;
        left: 50%;
        max-width: 320px;
        width: 100%;
        aspect-ratio: 1;
        background-color: #fff;
        transform: translate(-50%, -50%);
        overflow: hidden;
      }

      .dots {
        position: absolute;
        inset: 0;
        display: grid;
        grid-template-columns: repeat(3, auto);
        justify-content: center;
        align-content: center;
        gap: 30px;
      }

      .dots__dot {
        --size: 30px;
        position: relative;
        width: var(--size);
        height: var(--size);

        &:nth-child(1) {
          --delay: 0s;
          --y: -150%;
          --x: calc(var(--size) * 2);
        }
        &:nth-child(2) {
          --delay: 0.15s;
          --y: -250%;
          --x: calc(var(--size) * 2);
        }
        &:nth-child(3) {
          --delay: 0.3s;
          --y: -300%;
          --x: calc(var(--size) * -4);
        }
      }

      .dots__dot-inner {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        transform-origin: center bottom;
        animation: scale1 0.6s ease-in-out calc(0s + var(--delay, 0s)) both;

        &::after {
          content: "";
          display: block;
          position: absolute;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          border-radius: 50%;
          background-color: #888;
          transform-origin: center bottom;
          animation:
            jump 0.6s ease-in-out calc(0.2s + var(--delay, 0s)) both,
            scale2 0.2s ease-out calc(0.8s + var(--delay, 0s)) forwards;
        }
      }

      @keyframes scale1 {
        from {
          transform: scale(1, 1);
        }
        20% {
          transform: scale(1.2, 0.7);
        }
        60% {
          transform: scale(0.8, 1.2);
        }
        to {
          transform: scale(1, 1);
        }
      }

      @keyframes scale2 {
        from,
        to {
          transform: scale(1, 1);
        }
        50% {
          transform: scale(1.2, 0.7);
        }
      }

      @keyframes jump {
        from {
          left: 0;
        }
        to {
          left: var(--x);
        }

        from,
        to {
          transform: translateY(0);
        }
        50% {
          transform: translateY(var(--y));
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="dots">
        <div class="dots__dot">
          <div class="dots__dot-inner"></div>
        </div>
        <div class="dots__dot">
          <div class="dots__dot-inner"></div>
        </div>
        <div class="dots__dot">
          <div class="dots__dot-inner"></div>
        </div>
      </div>
    </div>
  </body>
</html>
