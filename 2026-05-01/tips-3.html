<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ダウンロード・棒グラフ</title>
    <style>
      html {
        background-color: #e0e0e0;
      }

      .container {
        position: absolute;
        top: 50%;
        left: 50%;
        max-width: 320px;
        width: 100%;
        aspect-ratio: 1;
        background-color: #fff;
        transform: translate(-50%, -50%);
        overflow: hidden;
      }

      .wrapper {
        position: absolute;
        inset: 0;
        display: grid;
        column-gap: 24px;
        grid-auto-flow: column;
        place-content: center;
        transform: scale(1.3);
      }

      .box {
        --size: 80px;
        position: relative;
        width: var(--size);
        height: var(--size);
        background-color: #f1f1f1;
        border-radius: 16px;
      }

      .download {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 45px;
        height: 42px;
      }

      .download__arrow {
        position: absolute;
        top: 0;
        left: 50%;
        width: 6px;
        height: 28px;
        background-color: #888;
        border-radius: 16px;
        transform: translateX(-50%);
        animation: download-arrow 1s ease-in-out 0s both;

        &::before,
        &::after {
          content: "";
          display: block;
          position: absolute;
          bottom: 0;
          left: 0;
          width: 100%;
          height: 16px;
          background-color: #888;
          border-radius: 16px;
          transform-origin: bottom;
        }
        &::before {
          transform: rotate(-45deg) translateX(30%);
        }
        &::after {
          transform: rotate(45deg) translateX(-30%);
        }
      }

      .download__bottom {
        position: absolute;
        bottom: 0;
        left: 50%;
        width: 100%;
        height: 6px;
        background-color: #888;
        border-radius: 16px;
        transform: translateX(-50%);
        animation: download-bottom 1s ease-in-out 0s both;

        &::before,
        &::after {
          content: "";
          display: block;
          position: absolute;
          bottom: 0;
          width: 6px;
          height: 15px;
          background-color: #888;
          border-radius: 16px;
        }
        &::before {
          left: 0;
        }
        &::after {
          right: 0;
        }
      }

      @keyframes download-arrow {
        from,
        to {
          transform: translateX(-50%) translateY(0%);
        }
        50% {
          transform: translateX(-50%) translateY(51%);
        }
      }

      @keyframes download-bottom {
        from,
        to {
          width: 100%;
        }
        50% {
          width: 130%;
        }
      }

      .chart {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 45px;
        height: 42px;
      }

      .chart__line {
        position: absolute;
        bottom: 0;
        width: 20%;
        background-color: #888;
        border-radius: 8px;

        &:nth-child(1) {
          left: 0;
          height: 40%;
          animation:
            chart-up 0.4s ease-in-out 0.2s both,
            chart-down 0.4s ease-in-out 1.4s forwards;
        }
        &:nth-child(2) {
          left: 50%;
          height: 70%;
          transform: translateX(-50%);
        }
        &:nth-child(3) {
          right: 0;
          height: 100%;
          animation:
            chart-down 0.4s ease-in-out 0.2s both,
            chart-up 0.4s ease-in-out 0.8s forwards;
        }
      }

      @keyframes chart-up {
        from {
          height: 40%;
        }
        60% {
          height: 110%;
        }
        to {
          height: 100%;
        }
      }

      @keyframes chart-down {
        from {
          height: 100%;
        }
        60% {
          height: 30%;
        }
        to {
          height: 40%;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="wrapper">
        <div class="box">
          <div class="download">
            <div class="download__arrow"></div>
            <div class="download__bottom"></div>
          </div>
        </div>
        <div class="box">
          <div class="chart">
            <div class="chart__line"></div>
            <div class="chart__line"></div>
            <div class="chart__line"></div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
