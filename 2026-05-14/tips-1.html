<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ティッシュ</title>
    <style>
      html {
        background-color: #e0e0e0;
      }

      .container {
        position: absolute;
        top: 50%;
        left: 50%;
        max-width: 320px;
        width: 100%;
        aspect-ratio: 1;
        background-color: #fff;
        transform: translate(-50%, -50%);
        overflow: hidden;
      }

      .wrapper {
        position: absolute;
        inset: 0;
        transform: scale(1.4);
        display: grid;
        place-content: center;
      }

      .tissue {
        position: relative;
        width: 150px;
        height: 60px;

        &::before,
        &::after {
          content: "";
          position: absolute;
          z-index: 1;
        }
        &::before {
          inset: 0;
          background-color: #999;
          border-radius: 20px 20px 5px 5px;
        }
        &::after {
          bottom: 0;
          left: 0;
          width: 100%;
          height: 50%;
          background-color: #777;
          border-radius: 0 0 5px 5px;
        }
      }

      .paper1,
      .paper2 {
        position: absolute;
        bottom: 99%;
        left: 50%;
        width: 70%;
        height: 50%;
        transform: translate(-50%, 0);
        transform-origin: center bottom;
        background-color: #ccc;
        clip-path: polygon(0 0, 100% 0, 98% 100%, 2% 100%);
      }

      .paper1 {
        animation: pull 1.4s ease-in-out 0s infinite both;
      }

      .paper2 {
        animation: push 1.4s ease-in-out 0s infinite both;
      }

      @keyframes pull {
        0%,
        14.29% {
          opacity: 1;
          height: 50%;
          transform: translate(-50%, 0);
        }
        37.5% {
          height: 80%;
          transform: translate(-50%, 0);
        }
        51.43% {
          opacity: 1;
        }
        60.71%,
        100% {
          opacity: 0;
          height: 80%;
          transform: translate(-50%, -200%) rotate(20deg);
        }
      }

      @keyframes push {
        0%,
        25% {
          height: 50%;
          bottom: 0;
        }
        55% {
          height: 80%;
        }
        75%,
        100% {
          height: 50%;
          bottom: 99%;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="wrapper">
        <div class="tissue">
          <div class="paper2"></div>
          <div class="paper1"></div>
        </div>
      </div>
    </div>
  </body>
</html>
