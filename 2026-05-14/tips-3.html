<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ひっくり返す</title>
    <style>
      html {
        background-color: #e0e0e0;
      }

      .container {
        position: absolute;
        top: 50%;
        left: 50%;
        max-width: 320px;
        width: 100%;
        aspect-ratio: 1;
        background-color: #fff;
        transform: translate(-50%, -50%);
        overflow: hidden;
      }

      .wrapper {
        position: absolute;
        inset: 0;
        transform: translate(0, -6%) scale(1.4);
      }

      .box {
        --size: 70px;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: calc(var(--size) * 2);
        height: var(--size);

        &::after {
          content: "";
          display: block;
          position: absolute;
          bottom: 0;
          left: 50%;
          width: 200%;
          height: 200%;
          background-color: #f1f1f1;
          transform: translate(-50%, 100%);
        }
      }

      .main-block {
        position: relative;
        width: var(--size);
        height: var(--size);
        transform-origin: right bottom;
        animation: rolling-right 1.9s ease-in-out 0s infinite both;

        &::before {
          content: "";
          display: block;
          position: absolute;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          border-radius: 20%;
          background-color: #999;
          transform-origin: right top;
          animation: rolling-right-inner 1.9s ease-in-out 0s infinite both;
        }
      }

      @keyframes rolling-right {
        0%,
        10.53% {
          transform: rotate(0deg);
        }
        28.95%,
        100% {
          transform: rotate(90deg);
        }
      }

      @keyframes rolling-right-inner {
        0%,
        23.68% {
          transform: rotate(0deg);
        }
        31.58% {
          transform: rotate(8deg);
        }
        39.47%,
        100% {
          transform: rotate(0deg);
        }
      }

      .left-block {
        position: absolute;
        bottom: 0;
        left: 0;
        width: var(--size);
        height: var(--size);
        transform: translateX(-30%);

        &::before {
          content: "";
          display: block;
          position: absolute;
          bottom: 0;
          left: 50%;
          width: 100%;
          height: 100%;
          background-color: #ccc;
          border-radius: 20%;
          animation: left-block-anim 1.9s ease-in-out 0s infinite both;
        }
      }

      @keyframes left-block-anim {
        0%,
        10.53% {
          width: 100%;
          height: 100%;
          transform: translateX(-50%) translateY(100%);
        }
        29.47% {
          width: 90%;
          height: 125%;
          transform: translateX(-50%) translateY(0);
        }
        42.11%,
        52.63% {
          width: 100%;
          height: 100%;
          transform: translateX(-50%) translateY(0);
        }
        68.42% {
          width: 90%;
          height: 120%;
          transform: translateX(-50%) translateY(0);
        }
        84.21%,
        100% {
          width: 120%;
          height: 60%;
          transform: translateX(-50%) translateY(100%);
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="wrapper">
        <div class="box">
          <div class="left-block"></div>
          <div class="main-block"></div>
        </div>
      </div>
    </div>
  </body>
</html>
