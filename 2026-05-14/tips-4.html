<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ヘッドフォン</title>
    <style>
      html {
        background-color: #e0e0e0;
      }

      .container {
        position: absolute;
        top: 50%;
        left: 50%;
        max-width: 320px;
        width: 100%;
        aspect-ratio: 1;
        background-color: #fff;
        transform: translate(-50%, -50%);
        overflow: hidden;
      }

      .wrapper {
        position: absolute;
        inset: 0;
        transform: scale(1.6);
        display: grid;
        place-content: center;
      }

      .box {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 65px;
        aspect-ratio: 100/115;

        &::before {
          content: "";
          display: block;
          position: absolute;
          top: 50%;
          left: 50%;
          transform: translate(-50%, -50%);
          width: 110%;
          height: 100%;
          background-color: #ccc;
          border-radius: 999px;
          animation: box-anim 3s ease-in-out 0s infinite both;
        }
      }

      @keyframes box-anim {
        0%,
        30% {
          width: 110%;
          height: 100%;
        }
        42% {
          width: 96%;
          height: 110%;
        }
        50%,
        60% {
          width: 100%;
          height: 105%;
        }
        70% {
          width: 114%;
          height: 95%;
        }
        76.67%,
        100% {
          width: 110%;
          height: 100%;
        }
      }

      .headphone {
        box-sizing: border-box;
        position: absolute;
        top: 0;
        left: 50%;
        transform: translate(-50%, -80%);
        width: 80px;
        height: 60px;
        border: 6px solid #888;
        border-bottom-color: transparent;
        border-radius: 999px 999px 0 0;
        animation:
          headphone-move 3s ease-in-out 0s infinite both,
          headphone-width 3s ease-in-out 0s infinite both;

        &::after,
        &::before {
          content: "";
          display: block;
          position: absolute;
          bottom: 0;
          width: 25px;
          height: 40px;
          background: linear-gradient(to right, #aaa 60%, #bbb 0);
          border-radius: 12px 5px 5px 12px;
        }
        &::after {
          left: 0;
          transform: translate(-80%, 50%);
        }
        &::before {
          right: 0;
          transform: translate(80%, 50%) scaleX(-1);
        }
      }

      @keyframes headphone-move {
        0%,
        6.67% {
          transform: translate(-50%, -80%);
        }
        18.67% {
          transform: translate(-50%, -28%);
        }
        26.67%,
        73.33% {
          transform: translate(-50%, -30%);
        }
        87.33% {
          transform: translate(-50%, -82%);
        }
        96.67%,
        100% {
          transform: translate(-50%, -80%);
        }
      }

      @keyframes headphone-width {
        0%,
        26.67% {
          width: 94px;
        }
        38.67% {
          width: 72px;
        }
        46.67%,
        60% {
          width: 80px;
        }
        71.67%,
        100% {
          width: 94px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="wrapper">
        <div class="box">
          <div class="headphone"></div>
        </div>
      </div>
    </div>
  </body>
</html>
