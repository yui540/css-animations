<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>いいねアニメーション1</title>
    <style>
      html {
        background-color: #e0e0e0;
      }

      .container {
        position: absolute;
        top: 50%;
        left: 50%;
        max-width: 320px;
        width: 100%;
        aspect-ratio: 1;
        background-color: #fff;
        transform: translate(-50%, -50%);
        overflow: hidden;
      }

      .wrapper {
        position: absolute;
        inset: 0;
        display: grid;
        place-content: center;
        transform: scale(3.4);
      }

      .heart {
        --size: 24px;
        position: relative;
        width: var(--size);
        height: var(--size);
        box-sizing: border-box;
        background: url("./heart-s.svg") center / contain no-repeat;
      }

      .circle {
        box-sizing: border-box;
        position: absolute;
        top: 50%;
        left: 50%;
        width: 350%;
        height: 350%;
        border-radius: 50%;
        border: solid 1px #fe587a;
        animation: circle-anim 1.1s cubic-bezier(0, 0.06, 0.29, 1) 0s both;
      }

      @keyframes circle-anim {
        from,
        to {
          opacity: 0;
        }
        50%,
        80% {
          opacity: 0.4;
        }

        from {
          transform: translate(-50%, -50%) scale(0);
        }
        to {
          transform: translate(-50%, -50%) scale(0.4);
        }
      }

      .particle {
        --d: 0s;
        --size: 5px;
        --translate-y: -28px;
        position: absolute;
        top: calc(45% - (var(--size) / 2));
        left: calc(50% - (var(--size) / 2));
        width: var(--size);
        height: var(--size);
        border-radius: 50%;
        animation: move 0.65s cubic-bezier(0.63, -0.01, 0.29, 1) var(--d, 0s)
          both;
      }

      .particle::before {
        content: "";
        display: block;
        width: 100%;
        height: 100%;
        border-radius: inherit;
        background-color: #fe5064;
        animation:
          scale-in 0.4s ease-out var(--d, 0s) both,
          scale-out 0.4s ease-out calc(0.55s + var(--d, 0s)) forwards;
      }

      .particle:nth-child(2n) {
        --d: 0.1s;
        --size: 4px;
        --translate-y: -27px;

        &::before {
          background-color: #8eb539;
        }
      }

      .particle:nth-child(3n) {
        --d: 0.2s;
        --size: 3px;
        --translate-y: -26px;

        &::before {
          background-color: #3e9be7;
        }
      }

      .particle:nth-child(4n) {
        &::before {
          background-color: #f5ce50;
        }
      }

      .particle:nth-child(1) {
        --rotate: 0deg;
      }
      .particle:nth-child(2) {
        --rotate: 36deg;
      }
      .particle:nth-child(3) {
        --rotate: 72deg;
      }
      .particle:nth-child(4) {
        --rotate: 108deg;
      }
      .particle:nth-child(5) {
        --rotate: 144deg;
      }
      .particle:nth-child(6) {
        --rotate: 180deg;
      }
      .particle:nth-child(7) {
        --rotate: 216deg;
      }
      .particle:nth-child(8) {
        --rotate: 252deg;
      }
      .particle:nth-child(9) {
        --rotate: 288deg;
      }
      .particle:nth-child(10) {
        --rotate: 324deg;
      }

      @keyframes move {
        from {
          opacity: 0;
          transform: rotate(var(--rotate, 0)) translateY(0);
        }
        to {
          opacity: 1;
          transform: rotate(var(--rotate, 0))
            translateY(var(--translate-y, 0px));
        }
      }

      @keyframes scale-in {
        from {
          transform: scale(0);
        }
        to {
          transform: scale(1);
        }
      }

      @keyframes scale-out {
        from {
          transform: scale(1);
        }
        to {
          transform: scale(0);
        }
      }

      .fill {
        position: absolute;
        top: 5%;
        left: 0;
        width: 100%;
        height: 100%;
        background: url("./heart-f.svg") center / contain no-repeat;
        animation: popup 0.7s ease-in-out 0.15s both;
      }

      @keyframes popup {
        0% {
          transform: scale(0);
        }
        40% {
          transform: scale(1.6);
        }
        60% {
          transform: scale(1.04);
        }
        80% {
          transform: scale(1.1);
        }
        100% {
          transform: scale(1.04);
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="wrapper">
        <div class="heart">
          <div class="circle"></div>
          <div class="particle"></div>
          <div class="particle"></div>
          <div class="particle"></div>
          <div class="particle"></div>
          <div class="particle"></div>
          <div class="particle"></div>
          <div class="particle"></div>
          <div class="particle"></div>
          <div class="particle"></div>
          <div class="particle"></div>
          <div class="fill"></div>
        </div>
      </div>
    </div>
  </body>
</html>
