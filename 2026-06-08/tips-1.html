<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ブックマーク1</title>
    <style>
      html {
        background-color: #e0e0e0;
      }

      .container {
        position: absolute;
        top: 50%;
        left: 50%;
        max-width: 320px;
        width: 100%;
        aspect-ratio: 1;
        background-color: #fff;
        transform: translate(-50%, -50%);
        overflow: hidden;
      }

      .box {
        --bg: #f9f9f9;
        box-sizing: border-box;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 110px;
        aspect-ratio: 1;
        background-color: var(--bg);
        border-radius: 20%;
        overflow: hidden;
      }

      .scene {
        position: absolute;
        inset: 0;
      }

      @keyframes scale {
        from {
          transform: scale(0);
        }
        to {
          transform: scale(1.3);
        }
      }

      .scene__bg {
        position: absolute;
        inset: 0;
        background-color: #fbe5ee;
        border-radius: 50%;
        animation: scale 0.8s cubic-bezier(0.7, 0.01, 0.23, 1) 0.4s both;
      }

      .scene__bg--alt {
        background-color: #f1f1f1;
        animation-delay: 2.6s;
      }

      .marks {
        --s: 78px;
        position: absolute;
        top: 0;
        left: 50%;
        transform: translate(-50%, 0%);
        width: var(--s);
        height: var(--s);
      }

      .marks__inner {
        position: absolute;
        inset: 0;
      }

      .marks__main {
        position: absolute;
        inset: 0;
        animation: up 0.55s cubic-bezier(0.75, 0.01, 0.24, 0.98) 2.6s both;
      }

      .mark {
        --c: #999;
        position: absolute;
        top: 0;
        left: 17.5%;
        width: 65%;
        height: 100%;
        background-color: var(--c);
        clip-path: polygon(0 -100%, 100% -100%, 100% 100%, 50% 80%, 0 100%);
      }

      .mark::after {
        content: "";
        position: absolute;
        inset: 0;
        background-color: var(--c);
        transform: translateY(-99%);
      }

      @keyframes up {
        from {
          transform: translateY(0);
        }
        50% {
          transform: translateY(22%);
        }
        to {
          transform: translateY(-101%);
        }
      }

      @keyframes reset {
        from {
          transform: translateY(-101%);
        }
        to {
          transform: translateY(0%);
        }
      }

      @keyframes color {
        from {
          background-color: #eee;
        }
        to {
          background-color: #999;
        }
      }

      @keyframes down {
        from {
          transform: perspective(700px) translateY(-40%) rotateX(80deg)
            rotateY(var(--z)) scale(1.5, 1.15);
        }
        to {
          transform: perspective(700px) translateY(0) rotateX(0deg) rotateY(0)
            scale(1);
        }
      }

      .mark--1 {
        --c: #999;
        animation:
          up 0.55s cubic-bezier(0.75, 0.01, 0.24, 0.98) 0s both,
          reset 0.01s ease-out 1s forwards,
          color 1s linear 2.6s forwards;
      }

      .mark--2 {
        --c: #e1c039;
        --z: 20deg;
        top: 0%;
        transform-origin: top center;
        animation: down 0.7s cubic-bezier(0.7, 0.01, 0.23, 1) 0.35s both;
      }

      .mark--3 {
        --c: #e9934f;
        --z: 12deg;
        top: 0%;
        transform-origin: top center;
        animation: down 0.7s cubic-bezier(0.7, 0.01, 0.23, 1) 0.5s both;
      }

      .mark--4 {
        --c: #e6508b;
        --z: 0deg;
        transform-origin: top center;
        animation: down 0.7s cubic-bezier(0.7, 0.01, 0.23, 1) 0.65s both;
      }

      @keyframes kira {
        from,
        to {
          transform: scale(0);
        }
        50% {
          transform: scale(1);
        }
      }

      .kira {
        --s: 32px;
        position: absolute;
        width: var(--s);
        height: var(--s);
        background: url(./kira.svg) center / contain no-repeat;
        animation: kira 0.6s ease-in-out var(--delay, 0s) both;
      }

      .kira--1 {
        --delay: 0.8s;
        top: 17%;
        left: 2%;
      }
      .kira--2 {
        --delay: 1s;
        top: 48%;
        right: 2%;
      }
      .kira--3 {
        --delay: 1.2s;
        top: 62%;
        left: 10%;
      }
      .kira--4 {
        --delay: 1.4s;
        top: 6%;
        right: 6%;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="box">
        <div class="scene">
          <div class="scene__bg"></div>
          <div class="scene__bg scene__bg--alt"></div>

          <div class="marks">
            <div class="marks__inner">
              <div class="mark mark--1"></div>
              <div class="marks__main">
                <div class="mark mark--2"></div>
                <div class="mark mark--3"></div>
                <div class="mark mark--4"></div>
              </div>
            </div>
          </div>

          <div class="kira kira--1"></div>
          <div class="kira kira--2"></div>
          <div class="kira kira--3"></div>
          <div class="kira kira--4"></div>
        </div>
      </div>
    </div>
  </body>
</html>
