<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ブックマーク2</title>
    <style>
      html {
        background-color: #e0e0e0;
      }

      .container {
        position: absolute;
        top: 50%;
        left: 50%;
        max-width: 320px;
        width: 100%;
        aspect-ratio: 1;
        background-color: #fff;
        transform: translate(-50%, -50%);
        overflow: hidden;
      }

      .box {
        --bg: #f9f9f9;
        box-sizing: border-box;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 110px;
        aspect-ratio: 1;
        background-color: var(--bg);
        border-radius: 20%;
        overflow: hidden;
      }

      .scene {
        position: absolute;
        inset: 0;
      }

      @keyframes panel-enter {
        from {
          transform: translate(-101%, -40%);
          opacity: 0;
        }
        to {
          transform: translate(0%, 0%);
          opacity: 1;
        }
      }

      @keyframes panel-exit {
        from {
          transform: translate(0%, 0%);
        }
        to {
          transform: translate(101%, 0%);
        }
      }

      @keyframes panel-flatten {
        from {
          border-radius: 0 0 100% 0;
        }
        to {
          border-radius: 0 0 0 0;
        }
      }

      @keyframes panel-round {
        from {
          border-radius: 0 0 0 0;
        }
        to {
          border-radius: 0 0 0 100%;
        }
      }

      .panel {
        position: absolute;
        inset: 0;
        animation:
          panel-enter 0.7s cubic-bezier(0.78, 0.01, 0.19, 0.98)
            calc(0s + var(--enter-delay, 0s)) both,
          panel-flatten 1.4s ease-in-out calc(0s + var(--enter-delay, 0s))
            forwards,
          panel-exit 0.6s cubic-bezier(0.78, 0.01, 0.19, 0.98)
            calc(0.15s + var(--exit-delay, 0s)) forwards,
          panel-round 0.6s ease-in-out calc(0s + var(--exit-delay, 0s)) forwards;
      }

      .panel--pink {
        --enter-delay: 0s;
        --exit-delay: 2.45s;
        background-color: #e6508b;
      }
      .panel--white {
        --enter-delay: 0.15s;
        --exit-delay: 2.32s;
        background-color: #fff;
      }
      .panel--blush {
        --enter-delay: 0.3s;
        --exit-delay: 2.2s;
        background-color: #fbe5ee;
      }

      .bookmark {
        --s: 78px;
        position: absolute;
        top: 0;
        left: 50%;
        transform: translate(-50%, 0%);
        width: var(--s);
        height: var(--s);
      }

      .bookmark__shape {
        --c: #999;
        position: absolute;
        top: 0;
        left: 17.5%;
        width: 65%;
        height: 100%;
        background-color: var(--c);
        clip-path: polygon(0 -100%, 100% -100%, 100% 100%, 50% 80%, 0 100%);
      }

      .bookmark__shape::after {
        content: "";
        position: absolute;
        inset: 0;
        background-color: var(--c);
        transform: translateY(-99%);
      }

      .bookmark__shape--base {
        --c: #999;
      }

      @keyframes bookmark-swing {
        0% {
          rotate: 25deg;
        }
        40% {
          rotate: -4deg;
        }
        60% {
          rotate: 2deg;
        }
        80% {
          rotate: -1deg;
        }
        100% {
          rotate: 0deg;
        }
      }

      @keyframes bookmark-tip {
        from {
          rotate: 0deg;
        }
        to {
          rotate: 20deg;
        }
      }

      .bookmark__shape--main {
        --c: #e6508b;
        transform-origin: top center;
        animation:
          bookmark-swing 1s ease-in-out 0.6s both,
          bookmark-tip 0.9s ease-in-out 2.2s forwards;
      }

      @keyframes shine-sweep {
        from {
          clip-path: polygon(
            calc(var(--shine-width) * -1) 0,
            0 0,
            calc(var(--shine-skew) * -1) 100%,
            calc((var(--shine-skew) + var(--shine-width)) * -1) 100%
          );
        }
        40%,
        to {
          clip-path: polygon(
            calc(100% + var(--shine-skew)) 0,
            calc(100% + var(--shine-skew) + var(--shine-width)) 0,
            calc(100% + var(--shine-width)) 100%,
            100% 100%
          );
        }
      }

      .shine {
        --shine-width: 60px;
        --shine-skew: 60%;
        position: absolute;
        inset: 0;
        background-color: rgba(255, 255, 255, 0.25);
        animation: shine-sweep 2s ease-in-out 1s both;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="box">
        <div class="scene">
          <div class="bookmark">
            <div class="bookmark__shape bookmark__shape--base"></div>
          </div>

          <div class="panel panel--pink"></div>
          <div class="panel panel--white"></div>
          <div class="panel panel--blush">
            <div class="bookmark">
              <div class="bookmark__shape bookmark__shape--main"></div>
            </div>
          </div>

          <div class="shine"></div>
        </div>
      </div>
    </div>
  </body>
</html>
