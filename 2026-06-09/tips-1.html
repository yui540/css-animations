<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>動く猫ちゃん1</title>
    <style>
      html {
        background-color: #e0e0e0;
      }

      .container {
        position: absolute;
        top: 50%;
        left: 50%;
        max-width: 320px;
        width: 100%;
        aspect-ratio: 1;
        background-color: #fff;
        transform: translate(-50%, -50%);
        overflow: hidden;
      }

      .scene {
        position: absolute;
        inset: 0;
        border-radius: 30px;
        overflow: hidden;
      }

      .box {
        --bg: #f9f9f9;
        box-sizing: border-box;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 264px;
        aspect-ratio: 264/211;
        background-color: var(--bg);
        border-radius: 40px;
        overflow: hidden;
      }

      .cat {
        display: block;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-65%, -45%);
        width: 130px;
        overflow: visible;
        animation:
          walk-in 0.7s cubic-bezier(0.76, 0, 0.25, 0.97) 0.2s both,
          walk-mid 0.7s cubic-bezier(0.76, 0, 0.25, 0.97) 1.2s forwards,
          walk-out 1.5s ease-in-out 2.6s forwards;
      }
      @keyframes walk-in {
        from {
          transform: translate(-80%, -45%);
        }
        to {
          transform: translate(-35%, -45%);
        }
      }
      @keyframes walk-mid {
        from {
          transform: translate(-35%, -45%);
        }
        to {
          transform: translate(-15%, -45%);
        }
      }
      @keyframes walk-out {
        from {
          transform: translate(-15%, -45%);
        }
        to {
          transform: translate(-80%, -45%);
        }
      }

      .cat__content {
        transform-origin: left bottom;
        animation:
          bob 0.7s ease-in-out 0.2s both,
          bob 0.7s ease-in-out 1.2s forwards,
          bob-out 1.6s ease-out 2.6s forwards;
      }
      @keyframes bob {
        from,
        to {
          transform: scale(1, 1);
        }
        50% {
          transform: translateY(-10%) scale(0.95, 1.1) rotate(3deg) skewX(-2deg);
        }
      }
      @keyframes bob-out {
        from,
        to {
          transform: scale(1, 1);
        }
        50% {
          transform: translateY(5%) scale(1.1, 0.98) rotate(-4deg) skewX(2deg);
        }
      }

      .cat__inner {
        transform-origin: center bottom;
        animation: breathe 1s ease-in-out 0s infinite;
      }
      @keyframes breathe {
        from,
        to {
          transform: scale(1, 1);
        }
        50% {
          transform: scale(1.04, 1.025) skewX(-1deg);
        }
      }

      .cat__tail {
        fill: none;
        stroke: #aaaaaa;
        stroke-width: 10px;
        stroke-linecap: round;
        transform-origin: 108px 97px;
        animation: tail-wag 0.4s ease-in-out 2s 2 both;
      }
      @keyframes tail-wag {
        from,
        to {
          transform: rotate(0deg);
        }
        50% {
          transform: rotate(-15deg);
        }
      }

      .cat__ears {
        transform: rotate(-10deg) translate(-15px, 18px) scale(1, 1.1);
        animation:
          ears-bob 0.7s ease-in-out 0.2s both,
          ears-bob 0.7s ease-in-out 1.2s forwards,
          ears-bob-out 1.6s ease-out 2.6s forwards;
      }
      @keyframes ears-bob {
        from,
        to {
          transform: rotate(-10deg) translate(-15px, 18px) scale(1, 1.1);
        }
        50% {
          transform: rotate(2deg) translate(12px, 12px) scale(1, 1.02);
        }
      }
      @keyframes ears-bob-out {
        from,
        to {
          transform: rotate(-10deg) translate(-15px, 18px) scale(1, 1.1);
        }
        50% {
          transform: rotate(2deg) translate(15px, 8px) scale(0.9, 1.1);
        }
      }

      .cat__ear {
        fill: #f1f1f1;
        stroke: #aaaaaa;
        stroke-width: 8px;
      }

      .cat__ear:nth-child(1) {
        transform-origin: 65px 25px;
        animation: ear-left 0.4s ease-in-out 1.4s 2 both;
      }
      @keyframes ear-left {
        from,
        to {
          transform: rotate(0deg);
        }
        50% {
          transform: rotate(-5deg) scale(1.08);
        }
      }

      .cat__ear:nth-child(2) {
        transform-origin: 74px 25px;
        animation: ear-right 0.4s ease-in-out 1.4s 2 both;
      }
      @keyframes ear-right {
        from,
        to {
          transform: rotate(0deg);
        }
        50% {
          transform: rotate(10deg) scale(1.08);
        }
      }

      .cat__body {
        fill: #aaaaaa;
        transform-origin: center bottom;
        transform: scale(1.04, 0.9);
      }

      .cat__eye {
        fill: #f5f5f5;
        transform-origin: center;
        transform-box: fill-box;
        transform: translate(-10px, 10px);
        animation:
          eye-move 0.7s ease-in-out 0.2s both,
          eye-move 0.7s ease-in-out 1.2s forwards,
          eye-move-out 1.6s ease-out 2.6s forwards;
      }
      @keyframes eye-move {
        from,
        to {
          transform: translate(-10px, 10px);
        }
        50% {
          transform: translate(0px, 4px) scaleY(1.15);
        }
      }
      @keyframes eye-move-out {
        from,
        to {
          transform: translate(-10px, 10px);
        }
        50% {
          transform: translate(-15px, 8px) scaleY(0.85);
        }
      }

      .line {
        position: absolute;
        right: 100px;
        bottom: 60px;
        width: 200px;
        height: 5px;
        border-radius: 999px;
        background-color: #ccc;
        transform-origin: right bottom;
        animation:
          line-in 0.7s ease-in-out 0.25s both,
          line-mid 0.7s ease-in-out 1.25s forwards,
          line-out 1.4s ease-in-out 2.5s forwards;
      }
      @keyframes line-in {
        from,
        to {
          bottom: 60px;
          rotate: 0deg;
        }
        50% {
          bottom: 75px;
          rotate: 3deg;
        }

        from {
          transform: translateX(-45%);
        }
        to {
          transform: translateX(-15%);
        }
      }
      @keyframes line-mid {
        from,
        to {
          bottom: 60px;
          rotate: 0deg;
        }
        50% {
          bottom: 75px;
          rotate: 2deg;
        }

        from {
          transform: translateX(-15%);
        }
        to {
          transform: translateX(0%);
        }
      }
      @keyframes line-out {
        from,
        to {
          bottom: 60px;
          right: 100px;
          rotate: 0deg;
        }
        50% {
          bottom: 65px;
          right: 110px;
          rotate: 2deg;
        }

        from {
          transform: translateX(0%);
        }
        to {
          transform: translateX(-45%);
        }
      }

      .line::after {
        content: "";
        display: block;
        position: absolute;
        top: 50%;
        right: -5px;
        transform: translateY(-50%);
        width: 55px;
        height: 370%;
        background-color: #fff;
        border-radius: 999px;
        filter: blur(3.5px) drop-shadow(0 0 4px rgba(0, 0, 0, 0.15));
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="scene">
        <div class="box">
          <svg class="cat" viewBox="0 0 148 115">
            <g class="cat__content">
              <g class="cat__inner">
                <path
                  class="cat__tail"
                  d="M114.085 101.509C126.144 106.365 136.457 103.51 142.414 96.7459"
                />
                <g class="cat__ears">
                  <path
                    class="cat__ear"
                    d="M40.4319 6.09395C41.702 6.13103 43.8288 7.06505 46.7137 9.4725C49.4451 11.7519 52.2728 14.8543 54.8755 18.0786C57.1922 20.9487 59.2586 23.8248 60.8374 26.132L30.945 32.6769C31.4339 29.3893 32.1857 25.072 33.2486 20.7955C34.3353 16.4236 35.686 12.3521 37.2759 9.4793C39.0367 6.29792 40.2119 6.08756 40.4319 6.09395Z"
                  />
                  <path
                    class="cat__ear"
                    d="M98.6758 10.4927C99.8265 10.1389 100.473 10.1407 100.745 10.186C100.805 10.2161 101.09 10.3782 101.56 10.9946C102.189 11.8213 102.873 13.1132 103.559 14.896C104.924 18.4471 106.008 23.1915 106.839 28.0962C107.621 32.7162 108.149 37.3061 108.489 40.8638L76.0713 26.8882C78.2945 24.7999 81.1965 22.1764 84.3271 19.6128C87.7416 16.8168 91.3179 14.1834 94.5166 12.3823C96.1157 11.4819 97.5156 10.8494 98.6758 10.4927Z"
                  />
                </g>
                <path
                  class="cat__body"
                  d="M124.824 76.3795C124.824 108.128 96.8814 114.128 62.4121 114.128C27.9429 114.128 0 105.122 9.2011e-08 76.3795C9.2011e-08 47.6368 27.9429 24.3362 62.4121 24.3362C96.8814 24.3362 124.824 47.6368 124.824 76.3795Z"
                />
                <rect
                  class="cat__eye"
                  x="35"
                  y="48.1279"
                  width="11"
                  height="19"
                  rx="5.5"
                />
                <rect
                  class="cat__eye"
                  x="67"
                  y="48.1279"
                  width="11"
                  height="19"
                  rx="5.5"
                />
              </g>
            </g>
          </svg>
          <div class="line"></div>
        </div>
      </div>
    </div>
  </body>
</html>
